## Dependências externas do KartBox v2 (baixadas automaticamente pelo idf.py build)
## Componentes built-in do ESP-IDF NÃO entram aqui.

dependencies:
  idf: ">=5.3"

  # Driver MIPI-DSI do painel ST7701S (480×800)
  # https://components.espressif.com/components/espressif/esp_lcd_st7701
  espressif/esp_lcd_st7701: "^1.0.0"

  # Driver de touch GT911 via I2C
  # https://components.espressif.com/components/espressif/esp_lcd_touch_gt911
  espressif/esp_lcd_touch_gt911: "^1.0.0"

  # Port do LVGL para ESP-IDF (puxa lvgl como sub-dependência)
  # https://components.espressif.com/components/espressif/esp_lvgl_port
  espressif/esp_lvgl_port: "^2.3.0"

  # TinyUSB (removido do IDF core no 5.x — agora via component manager)
  # https://components.espressif.com/components/espressif/esp_tinyusb
  espressif/esp_tinyusb: "^1.0.0"

  # P4 não tem rádio nativo — WiFi/BT passam pelo C6 coprocessador via SDIO.
  # esp_wifi_remote precisa do esp_hosted (RPC) pra funcionar.
  # Depois do build, rodar: idf.py menuconfig -> Component config -> Wi-Fi Remote -> slave target = esp32c6
  espressif/esp_wifi_remote: "*"
  espressif/esp_hosted: "*"

  # mDNS ("kartbox.local") — saiu do core do IDF pro component registry
  # a partir do 5.x. Usado em wifi_export.c pra achar o kartbox sem
  # precisar saber o IP (util sobretudo no modo STA, onde o IP depende
  # do roteador do usuario).
  # https://components.espressif.com/components/espressif/mdns
  espressif/mdns: "^1.2"
